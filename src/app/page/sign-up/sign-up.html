<div class="container">
    <div class="card">

        <h1>Create Account</h1>
        <p class="subtitle">Join SwiftMart Store</p>

        <form>

            <div class="input-group">
                <input type="text">
                <label>Full Name</label>
            </div>

            <div class="input-group">
                <input type="email">
                <label>Email Address</label>
            </div>

            <div class="input-group">
                <input type="password">
                <label>Password</label>
            </div>

            <div class="input-group">
                <input type="password">
                <label>Confirm Password</label>
            </div>

            <button type="submit" routerLink="/landing-page">Sign Up</button>

            <div class="bottom-text">
                Already have an account?
                <a routerLink="/login">Sign In</a>
            </div>

        </form>

    </div>
</div>
